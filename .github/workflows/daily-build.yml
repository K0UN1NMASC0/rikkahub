name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Process app icon
        run: |
          if [ -f "ic_launcher.png" ]; then
            sudo apt-get install -y imagemagick
            for size_dir in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              dir=$(echo $size_dir | cut -d: -f1)
              size=$(echo $size_dir | cut -d: -f2)
              mkdir -p app/src/main/res/mipmap-${dir}
              convert ic_launcher.png -resize ${size}x${size} app/src/main/res/mipmap-${dir}/ic_launcher.png
              cp app/src/main/res/mipmap-${dir}/ic_launcher.png app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            done
            rm -f app/src/main/res/mipmap-*/ic_launcher.webp
            rm -f app/src/main/res/mipmap-*/ic_launcher_round.webp
            rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          fi

      - name: Copy proactive message feature
        run: |
          TARGET="app/src/main/java/me/rerere/rikkahub/data/service"
          mkdir -p "$TARGET"
          if [ -d "proactive" ]; then
            cp proactive/*.kt "$TARGET/"
            echo "Proactive message files copied:"
            ls proactive/*.kt
          else
            echo "No proactive/ folder found, skipping"
          fi

      - name: Apply customization
        run: |
          python3 patch.py
          echo "=== Verification ==="
          MSG_FILE="app/src/main/java/me/rerere/rikkahub/ui/components/message/ChatMessage.kt"
          LIST_FILE="app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatList.kt"
          grep -n "Color(0xFFFCE5EB)" "$MSG_FILE" && echo "User bubble OK" || echo "WARN: User bubble not patched"
          grep -n "Color(0xFFFFFFFF)" "$MSG_FILE" && echo "AI bubble OK" || echo "WARN: AI bubble not patched"
          grep -n "spacedBy(4.dp)" "$LIST_FILE" && echo "Spacing OK" || echo "WARN: Spacing not patched"
          grep -n "Tulpa" app/src/main/res/values/strings.xml && echo "App name OK" || echo "WARN: App name not patched"
          grep -n "ProactiveMessageReceiver" app/src/main/AndroidManifest.xml && echo "Manifest OK" || echo "WARN: Manifest not patched"

      - name: Setup signing
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > ${{ github.workspace }}/release.jks
          echo "storeFile=${{ github.workspace }}/release.jks" >> local.properties
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | grep -oP '\d+')
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${VERSION:-dev}" >> $GITHUB_OUTPUT
          echo "code=${CODE:-0}" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION:-dev}-${SHA}" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tulpa-Release
          path: app/build/outputs/apk/release/*arm64*.apk
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Tulpa ${{ steps.version.outputs.version }} (${{ steps.version.outputs.sha }})"
          body: "自动构建 - ${{ github.event.head_commit.message }}"
          files: app/build/outputs/apk/release/*arm64*.apk
          prerelease: false
          make_latest: true
