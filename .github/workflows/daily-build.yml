name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Process app icon
        run: |
          if [ -f "ic_launcher.png" ]; then
            sudo apt-get install -y imagemagick
            for size_dir in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              dir=$(echo $size_dir | cut -d: -f1)
              size=$(echo $size_dir | cut -d: -f2)
              mkdir -p app/src/main/res/mipmap-${dir}
              convert ic_launcher.png -resize ${size}x${size} app/src/main/res/mipmap-${dir}/ic_launcher.png
              cp app/src/main/res/mipmap-${dir}/ic_launcher.png app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            done
            rm -f app/src/main/res/mipmap-*/ic_launcher.webp
            rm -f app/src/main/res/mipmap-*/ic_launcher_round.webp
            rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          fi

      - name: Download wing decorations
        run: |
          mkdir -p app/src/main/res/drawable-xxhdpi
          curl -L "https://img.heliar.top/file/1779196710409_%E7%BF%85%E8%86%80-%E5%8F%B3.png" -o app/src/main/res/drawable-xxhdpi/wing_right.png
          curl -L "https://img.heliar.top/file/1779196708496_%E7%BF%85%E8%86%80-%E5%B7%A6.png" -o app/src/main/res/drawable-xxhdpi/wing_left.png

      - name: Apply bubble customization
        run: |
          MSG_FILE="app/src/main/java/me/rerere/rikkahub/ui/components/message/ChatMessage.kt"
          LIST_FILE="app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatList.kt"

          # Add imports
          sed -i '/^import androidx.compose.foundation.layout.widthIn/a import androidx.compose.foundation.BorderStroke\nimport androidx.compose.foundation.Image\nimport androidx.compose.foundation.layout.offset\nimport androidx.compose.ui.layout.ContentScale\nimport androidx.compose.ui.zIndex' "$MSG_FILE"

          # --- User bubble: change shape, color, add border and contentColor ---
          sed -i '/shape = RoundedCornerShape(16.dp),/{
            N
            /primaryContainer/{
              s/shape = RoundedCornerShape(16.dp),/shape = RoundedCornerShape(19.dp),/
              s/color = MaterialTheme.colorScheme.primaryContainer.copy(alpha = settings.displaySetting.bubbleOpacity),/color = Color(0xFFFCE5EB),\n                                contentColor = Color(0xFFA36779),\n                                border = BorderStroke(1.dp, Color(0xFFF1C5D4)),/
            }
          }' "$MSG_FILE"

          # --- AI bubble: change shape, color, add border and contentColor ---
          sed -i '/shape = RoundedCornerShape(16.dp),/{
            N
            /surfaceContainerHigh/{
              s/shape = RoundedCornerShape(16.dp),/shape = RoundedCornerShape(19.dp),/
              s/color = MaterialTheme.colorScheme.surfaceContainerHigh.copy(alpha = settings.displaySetting.bubbleOpacity),/color = Color(0xFFFFFFFF),\n                                        contentColor = Color(0xFFA36779),\n                                        border = BorderStroke(1.dp, Color(0xFFF1C5D4)),/
            }
          }' "$MSG_FILE"

          # --- Change app name to Tulpa ---
          sed -i 's/<string name="app_name">RikkaHub<\/string>/<string name="app_name">Tulpa<\/string>/' app/src/main/res/values/strings.xml
          sed -i 's/<string name="app_name">RikkaHub<\/string>/<string name="app_name">Tulpa<\/string>/' app/src/main/res/values-zh-rCN/strings.xml 2>/dev/null || true
          sed -i 's/<string name="app_name">RikkaHub<\/string>/<string name="app_name">Tulpa<\/string>/' app/src/main/res/values-zh-rTW/strings.xml 2>/dev/null || true
          sed -i 's/<string name="app_name">RikkaHub<\/string>/<string name="app_name">Tulpa<\/string>/' app/src/main/res/values-ja/strings.xml 2>/dev/null || true

          # --- Wing decoration: inject using line-number based approach ---
          python3 << 'WING_PATCH'
          with open("app/src/main/java/me/rerere/rikkahub/ui/components/message/ChatMessage.kt", "r") as f:
              lines = f.readlines()

          # Find user bubble by looking for Color(0xFFFCE5EB)
          user_color_line = None
          ai_color_line = None
          for i, line in enumerate(lines):
              if "Color(0xFFFCE5EB)" in line:
                  user_color_line = i
              if "Color(0xFFFFFFFF)" in line and "border" not in line:
                  ai_color_line = i

          print(f"User bubble color at line: {user_color_line}")
          print(f"AI bubble color at line: {ai_color_line}")

          # For user bubble: find the "if (role == MessageRole.USER) {" line before it
          if user_color_line:
              for i in range(user_color_line, max(user_color_line - 15, 0), -1):
                  if "MessageRole.USER" in lines[i]:
                      # Get the indentation
                      indent = lines[i][:len(lines[i]) - len(lines[i].lstrip())]
                      # Insert Box wrapper after this line
                      box_open = indent + "    Box {\n"
                      wing_code = (
                          indent + "        Image(\n"
                          + indent + "            painter = painterResource(R.drawable.wing_right),\n"
                          + indent + "            contentDescription = null,\n"
                          + indent + "            modifier = Modifier\n"
                          + indent + "                .size(28.dp)\n"
                          + indent + "                .align(Alignment.TopEnd)\n"
                          + indent + "                .offset(x = 12.dp, y = (-7).dp)\n"
                          + indent + "                .zIndex(10f),\n"
                          + indent + "            contentScale = ContentScale.Fit\n"
                          + indent + "        )\n"
                      )
                      # Insert after the "if (role == MessageRole.USER) {" line
                      insert_pos = i + 1
                      lines.insert(insert_pos, box_open + wing_code)
                      print(f"User wing injected at line {insert_pos}")

                      # Now find the closing of user bubble section to add Box closing brace
                      # Look for "} else {" that comes after user bubble at same indent level
                      for j in range(user_color_line + 5, min(user_color_line + 30, len(lines))):
                          if lines[j].strip() == "} else {":
                              # Add closing brace before this line
                              lines.insert(j, indent + "    }\n")
                              print(f"User Box closed at line {j}")
                              break
                      break

          # Re-read to get updated line numbers
          # Find AI bubble
          ai_color_line = None
          for i, line in enumerate(lines):
              if "Color(0xFFFFFFFF)" in line and "border" not in line:
                  ai_color_line = i
                  break

          if ai_color_line:
              # Find "if (settings.displaySetting.showAssistantBubble) {" before it
              for i in range(ai_color_line, max(ai_color_line - 15, 0), -1):
                  if "showAssistantBubble" in lines[i]:
                      indent = lines[i][:len(lines[i]) - len(lines[i].lstrip())]
                      box_open = indent + "    Box {\n"
                      wing_code = (
                          indent + "        Image(\n"
                          + indent + "            painter = painterResource(R.drawable.wing_left),\n"
                          + indent + "            contentDescription = null,\n"
                          + indent + "            modifier = Modifier\n"
                          + indent + "                .size(28.dp)\n"
                          + indent + "                .align(Alignment.TopStart)\n"
                          + indent + "                .offset(x = (-12).dp, y = (-7).dp)\n"
                          + indent + "                .zIndex(10f),\n"
                          + indent + "            contentScale = ContentScale.Fit\n"
                          + indent + "        )\n"
                      )
                      insert_pos = i + 1
                      lines.insert(insert_pos, box_open + wing_code)
                      print(f"AI wing injected at line {insert_pos}")

                      # Find the closing: "} else {" after AI bubble's MarkdownBlock
                      for j in range(ai_color_line + 10, min(ai_color_line + 30, len(lines))):
                          if lines[j].strip() == "} else {" and "showAssistantBubble" not in lines[j-1]:
                              lines.insert(j, indent + "    }\n")
                              print(f"AI Box closed at line {j}")
                              break
                      break

          with open("app/src/main/java/me/rerere/rikkahub/ui/components/message/ChatMessage.kt", "w") as f:
              f.writelines(lines)

          print("Wing patch complete")
          WING_PATCH

          # --- ChatList: reduce message spacing ---
          sed -i 's/verticalArrangement = Arrangement.spacedBy(12.dp),/verticalArrangement = Arrangement.spacedBy(4.dp),/' "$LIST_FILE"

          echo "=== Bubble customization applied ==="
          grep -n "Color(0xFFFCE5EB)" "$MSG_FILE" && echo "User bubble color OK" || echo "WARN: User bubble not patched"
          grep -n "Color(0xFFFFFFFF)" "$MSG_FILE" && echo "AI bubble color OK" || echo "WARN: AI bubble not patched"
          grep -n "Color(0xFFA36779)" "$MSG_FILE" && echo "Text color OK" || echo "WARN: Text color not patched"
          grep -n "wing_right" "$MSG_FILE" && echo "User wing OK" || echo "WARN: User wing not patched"
          grep -n "wing_left" "$MSG_FILE" && echo "AI wing OK" || echo "WARN: AI wing not patched"
          grep -n "spacedBy(4.dp)" "$LIST_FILE" && echo "Spacing OK" || echo "WARN: Spacing not patched"
          grep -n "Tulpa" app/src/main/res/values/strings.xml && echo "App name OK" || echo "WARN: App name not patched"

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-debug
          path: app/build/outputs/apk/debug/*arm64*.apk
          retention-days: 7
